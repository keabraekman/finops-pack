AWSTemplateFormatVersion: "2010-09-09"
Description: Cross-account IAM role for finops-pack access.

Parameters:
  RoleName:
    Type: String
    Default: finops-pack-readonly
    Description: Name of the IAM role to create.
  AllowCostOptimizationHubEnrollment:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Set to true to allow finops-pack to opt this account in to Cost Optimization Hub.
      This adds write permissions for UpdateEnrollmentStatus and service-linked role creation.
  TrustedAccountId:
    Type: String
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID.
    Description: >
      AWS account ID allowed to assume this role. In multi-tenant deployments,
      this should be the provider or service account that runs finops-pack.
  ExternalId:
    Type: String
    MinLength: 8
    NoEcho: true
    Description: >
      Unique per customer or workspace ExternalId required when assuming the role.
      This mitigates confused deputy risk in multi-tenant cross-account access.

Conditions:
  AllowCohEnrollment: !Equals [!Ref AllowCostOptimizationHubEnrollment, "true"]

Resources:
  FinOpsPackInventoryReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read access for inventory and utilization data collected by finops-pack.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadInventoryAndUsage
            Effect: Allow
            Action:
              - autoscaling:Describe*
              - cloudwatch:Describe*
              - cloudwatch:Get*
              - cloudwatch:List*
              - ec2:Describe*
              - elasticloadbalancing:Describe*
              - lambda:Get*
              - lambda:List*
              - organizations:ListAccounts
              - rds:Describe*
              - rds:ListTagsForResource
              - s3:GetBucketLocation
              - s3:GetBucketTagging
              - s3:GetBucketVersioning
              - s3:GetEncryptionConfiguration
              - s3:GetLifecycleConfiguration
              - s3:GetMetricsConfiguration
              - s3:GetObject
              - s3:GetObjectTagging
              - s3:List*
              - tag:GetResources
              - tag:GetTagKeys
              - tag:GetTagValues
            Resource: "*"

  FinOpsPackCostReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read access for cost and billing signals used by finops-pack.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadCostAndBillingSignals
            Effect: Allow
            Action:
              - ce:Describe*
              - ce:Get*
              - ce:List*
              - cost-optimization-hub:ListEnrollmentStatuses
              - cur:DescribeReportDefinitions
              - pricing:DescribeServices
              - pricing:GetAttributeValues
              - pricing:GetProducts
            Resource: "*"

  FinOpsPackCostOptimizationHubEnrollmentPolicy:
    Condition: AllowCohEnrollment
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Optional permissions to enroll the account in Cost Optimization Hub.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCreateCostOptimizationHubServiceLinkedRole
            Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: arn:aws:iam::*:role/aws-service-role/cost-optimization-hub.bcm.amazonaws.com/AWSServiceRoleForCostOptimizationHub
            Condition:
              StringLike:
                iam:AWSServiceName: cost-optimization-hub.bcm.amazonaws.com
          - Sid: AllowPutCostOptimizationHubRolePolicy
            Effect: Allow
            Action:
              - iam:PutRolePolicy
            Resource: arn:aws:iam::*:role/aws-service-role/cost-optimization-hub.bcm.amazonaws.com/AWSServiceRoleForCostOptimizationHub
          - Sid: AllowUpdateCostOptimizationHubEnrollment
            Effect: Allow
            Action:
              - cost-optimization-hub:UpdateEnrollmentStatus
            Resource: "*"

  FinOpsPackReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Cross-account role for finops-pack with optional COH enrollment support.
      ManagedPolicyArns:
        - !Ref FinOpsPackInventoryReadPolicy
        - !Ref FinOpsPackCostReadPolicy
        - !If
          - AllowCohEnrollment
          - !Ref FinOpsPackCostOptimizationHubEnrollmentPolicy
          - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          # ExternalId helps prevent the confused deputy problem. The trusted party
          # should generate a unique value per customer or workspace and pass that
          # same value on every AssumeRole call.
          - Sid: AllowTrustedAccountWithExternalId
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${TrustedAccountId}:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId

Outputs:
  RoleArn:
    Description: ARN of the cross-account role for finops-pack.
    Value: !GetAtt FinOpsPackReadOnlyRole.Arn
  ExternalIdInstructions:
    Description: Reminder for how to use ExternalId when assuming the role.
    Value: !Sub >
      Use a unique ExternalId per customer or workspace and pass the same value
      on every AssumeRole request from account ${TrustedAccountId}. Example:
      finops-pack run --role-arn ${FinOpsPackReadOnlyRole.Arn} --external-id <your-external-id>
      [--enable-coh]
